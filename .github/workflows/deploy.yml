name: Panoramix Workflow

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  MIRROR_URL: "git@github.com:EpitechPromo2028/B-CCP-400-LIL-4-1-panoramix-ewan.tirlemont.git"
  PROJECT_NAME: "Panoramix"
  PUSH_BRANCH: "${{ github.ref }}"
  PUSHER: "${{ github.actor }}"
  REPOSITORY: "${{ github.repository }}"

jobs:
  is_repo_a_mirror:
    runs-on: ubuntu-latest
    if: github.repository != 'git@github.com:EpitechPromo2028/B-CCP-400-LIL-4-1-panoramix-ewan.tirlemont.git'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check if repo is a mirror
        run: |
          URL_WITHOUT_GIT_COM="${MIRROR_URL#*:}"
          REPO_URL_WITHOUT_DOT_GIT="${URL_WITHOUT_GIT_COM%.git}"
          if [[ "${GITHUB_REPOSITORY}" == "${REPO_URL_WITHOUT_DOT_GIT}" ]]; then
            echo "is_mirror=true" >> $GITHUB_ENV
            echo "Error: This repository is a mirror"
            exit 1
          else
            echo "is_mirror=false" >> $GITHUB_ENV
            echo "This repository is not a mirror"
            exit 0
          fi
      - name: Handle HTML directory for mirror
        if: env.is_mirror == 'true'
        run: |
          if [ -d "html" ]; then
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git rm -rf html/
            git commit -m "style(documentation): remove html to handle coding style errors"
            git push
          fi

  check_coding_style:
    needs: [is_repo_a_mirror]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/epitech/coding-style-checker:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1
      - name: Remove html directory
        run: rm -rf html
      - name: Check coding style runner launching
        run: check.sh $(pwd) $(pwd)
      - name: verify coding style
        run: |
          while IFS=":" read -r FILE LINE SEVERITY RULE _; do
              echo "::error file=$FILE,line=$LINE,title=$SEVERITY coding style error::$RULE"
          done < "$(pwd)/coding-style-reports.log"

          if [ -s "$(pwd)/coding-style-reports.log" ]; then
              exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [is_repo_a_mirror, check_coding_style]
    container:
      image: epitechcontent/epitest-docker:latest
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/lockfiles') }}
          restore-keys: |
            ${{ runner.os }}-build-
      - name: Build
        run: make

  documentation:
    needs: [is_repo_a_mirror]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - name: Install Doxygen
        run: sudo apt-get install doxygen graphviz -y
      - name: Generate documentation
        run: |
          rm -rf html
          doxygen Doxyfile
      - name: Commit documentation
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add html/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(docs): update documentation"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Skipping push for pull request"
            else
              git push origin HEAD:${{ github.ref }}
            fi
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [build, documentation]
    if: ${{ github.repository != 'git@github.com:EpitechPromo2028/B-CCP-400-LIL-4-1-panoramix-ewan.tirlemont.git' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_URL }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

  discord_and_email_report:
    runs-on: ubuntu-latest
    needs: [is_repo_a_mirror, check_coding_style, build, documentation, deploy]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Format workflow conclusion
        id: conclusion
        run: |
          MIRROR_STATUS="${{ needs.is_repo_a_mirror.result }}"
          CODING_STYLE_STATUS="${{ needs.check_coding_style.result }}"
          BUILD_STATUS="${{ needs.build.result }}"
          DOCUMENTATION_STATUS="${{ needs.documentation.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          if [ "$MIRROR_STATUS" == "failure" ]; then
            MIRROR_STATUS="❌ Failed"
          else
            MIRROR_STATUS="✅ Success"
          fi

          if [ "$CODING_STYLE_STATUS" == "failure" ]; then
            CODING_STYLE_STATUS="❌ Failed"
          else
            CODING_STYLE_STATUS="✅ Success"
          fi

          if [ "$BUILD_STATUS" == "failure" ]; then
            BUILD_STATUS="❌ Failed"
          else
            BUILD_STATUS="✅ Success"
          fi

          if [ "$DOCUMENTATION_STATUS" == "failure" ]; then
            DOCUMENTATION_STATUS="❌ Failed"
          else
            DOCUMENTATION_STATUS="✅ Success"
          fi

          if [ "$DEPLOY_STATUS" == "failure" ]; then
            DEPLOY_STATUS="❌ Failed"
          else
            DEPLOY_STATUS="✅ Success"
          fi

          if [ "$MIRROR_STATUS" == "❌ Failed" ] || [ "$CODING_STYLE_STATUS" == "❌ Failed" ] || [ "$BUILD_STATUS" == "❌ Failed" ] || [ "$DOCUMENTATION_STATUS" == "❌ Failed" ] || [ "$DEPLOY_STATUS" == "❌ Failed" ]; then
            EMBED_COLOR="15158332"
            WORKFLOW_STATUS="❌ Failed"
          else
            EMBED_COLOR="3066993"
            WORKFLOW_STATUS="✅ Success"
          fi

          echo "mirror_status=${MIRROR_STATUS}" >> $GITHUB_ENV
          echo "coding_style_status=${CODING_STYLE_STATUS}" >> $GITHUB_ENV
          echo "build_status=${BUILD_STATUS}" >> $GITHUB_ENV
          echo "documentation_status=${DOCUMENTATION_STATUS}" >> $GITHUB_ENV
          echo "deploy_status=${DEPLOY_STATUS}" >> $GITHUB_ENV
          echo "workflow_status=${WORKFLOW_STATUS}" >> $GITHUB_ENV
          echo "embed_color=${EMBED_COLOR}" >> $GITHUB_ENV

      - name: Get Commit Messages
        id: commits
        run: |
          COMMIT_MESSAGES=$(git log -1 --pretty=format:"%h - %s (%an)")
          echo "commit_messages=${COMMIT_MESSAGES}" >> $GITHUB_ENV

      - name: Send Discord Notification
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          embed-title: "Workflow Report - ${{ env.PROJECT_NAME }}"
          embed-description: |
            **Workflow Status**: `${{ env.workflow_status }}`
            **Mirror Check**: `${{ env.mirror_status }}`
            **Coding Style**: `${{ env.coding_style_status }}`
            **Build**: `${{ env.build_status }}`
            **Documentation**: `${{ env.documentation_status }}`
            **Deployment**: `${{ env.deploy_status }}`

            **Branch**: `${{ env.PUSH_BRANCH }}`
            **Pusher**: `${{ env.PUSHER }}`
            **Repository**: `${{ env.REPOSITORY }}`

            **Commits**:
            `${{ env.commit_messages }}`

            _This report was generated automatically by GitHub Actions._
          embed-color: ${{ env.embed_color }}
          embed-image-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Workflow Report - ${{ env.PROJECT_NAME }}"
          to: ewan.tirlemont@epitech.eu
          from: GitHub Actions
          body: |
            Workflow Report - ${{ env.PROJECT_NAME }}

            Workflow Status: ${{ env.workflow_status }}
            Mirror Check: ${{ env.mirror_status }}
            Coding Style: ${{ env.coding_style_status }}
            Build: ${{ env.build_status }}
            Documentation: ${{ env.documentation_status }}
            Deployment: ${{ env.deploy_status }}

            Branch: ${{ env.PUSH_BRANCH }}
            Pusher: ${{ env.PUSHER }}
            Repository: ${{ env.REPOSITORY }}

            Commits:
            ${{ env.commit_messages }}

            This report was generated automatically by GitHub Actions.